<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineZon Pro</title>
    <!-- Tailwind CSS (Modernes Design) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { mcgreen: '#39ff14', darkbg: '#0f172a', cardbg: '#1e293b' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: white; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-text { text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md text-center transition-all">
        <h1 class="text-4xl font-extrabold text-mcgreen mb-2 glow-text"><i class="fa-solid fa-cubes"></i> MineZon</h1>
        <p class="text-gray-400 mb-8">Bedrock Economy System</p>
        
        <button onclick="createServer()" class="w-full bg-mcgreen text-black font-bold py-3 rounded-lg hover:bg-green-400 transition mb-4 shadow-[0_0_15px_rgba(57,255,20,0.4)]">
            <i class="fa-solid fa-server mr-2"></i> Neuen Serverraum starten
        </button>
        
        <div class="flex items-center my-4">
            <hr class="flex-grow border-gray-600"><span class="px-3 text-gray-500 text-sm">ODER</span><hr class="flex-grow border-gray-600">
        </div>

        <input type="text" id="server-code-input" placeholder="Server Code eingeben..." class="w-full bg-gray-800 border border-gray-600 text-white rounded-lg px-4 py-3 mb-4 focus:outline-none focus:border-mcgreen tracking-widest text-center text-xl uppercase">
        <button onclick="joinServer()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-500 transition">
            <i class="fa-solid fa-right-to-bracket mr-2"></i> Beitreten
        </button>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" class="hidden w-full max-w-6xl flex flex-col md:flex-row gap-6">
        
        <!-- SIDEBAR -->
        <div class="glass-panel w-full md:w-1/4 rounded-2xl p-6 flex flex-col gap-4 h-fit">
            <h2 class="text-2xl font-bold text-mcgreen glow-text mb-4"><i class="fa-solid fa-cubes"></i> MineZon</h2>
            <div class="bg-gray-800 p-3 rounded-lg text-center border border-gray-700">
                <span class="text-xs text-gray-400 block uppercase tracking-wider">Aktueller Server</span>
                <span id="display-code" class="text-xl font-bold text-white tracking-widest">---</span>
            </div>
            
            <div class="mt-4">
                <h3 class="text-sm text-gray-400 mb-2"><i class="fa-solid fa-location-crosshairs"></i> Meine Position (Smart Navi)</h3>
                <div class="flex gap-2">
                    <input type="number" id="my_x" placeholder="X" class="w-1/3 bg-gray-800 rounded p-2 text-center text-sm" onchange="loadShops()">
                    <input type="number" id="my_y" placeholder="Y" class="w-1/3 bg-gray-800 rounded p-2 text-center text-sm" onchange="loadShops()">
                    <input type="number" id="my_z" placeholder="Z" class="w-1/3 bg-gray-800 rounded p-2 text-center text-sm" onchange="loadShops()">
                </div>
                <p class="text-xs text-gray-500 mt-2">Trage deine Koordinaten ein, um Shops nach Entfernung zu sortieren.</p>
            </div>
            
            <button onclick="document.getElementById('shop-modal').classList.remove('hidden')" class="mt-6 w-full border-2 border-mcgreen text-mcgreen hover:bg-mcgreen hover:text-black font-bold py-2 rounded-lg transition">
                + Shop eintragen
            </button>
        </div>

        <!-- MAIN CONTENT -->
        <div class="w-full md:w-3/4 flex flex-col gap-4">
            <div class="flex justify-between items-center bg-cardbg p-4 rounded-xl shadow border border-gray-700">
                <h2 class="text-xl font-bold"><i class="fa-solid fa-store text-mcgreen"></i> Marktplatz</h2>
                <button onclick="loadShops()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-rotate-right"></i> Aktualisieren</button>
            </div>
            
            <!-- SHOPS GRID -->
            <div id="shops-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Shops load here -->
            </div>
        </div>
    </div>

    <!-- ADD SHOP MODAL (Popup) -->
    <div id="shop-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center backdrop-blur-sm z-50">
        <div class="glass-panel p-6 rounded-2xl w-full max-w-md relative">
            <button onclick="document.getElementById('shop-modal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-white"><i class="fa-solid fa-xmark fa-xl"></i></button>
            <h3 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2">Neuen Shop registrieren</h3>
            <div class="flex flex-col gap-3">
                <input type="text" id="s_name" placeholder="Shop Name (z.B. Eisen-Baron)" class="bg-gray-800 p-3 rounded text-white border border-gray-600 focus:border-mcgreen focus:outline-none">
                <input type="text" id="s_owner" placeholder="Dein Spielername" class="bg-gray-800 p-3 rounded text-white border border-gray-600 focus:border-mcgreen focus:outline-none">
                <input type="text" id="s_item" placeholder="Bietet an (z.B. Mending Buch)" class="bg-gray-800 p-3 rounded text-white border border-gray-600 focus:border-mcgreen focus:outline-none">
                <input type="text" id="s_price" placeholder="Preis (z.B. 10 Smaragde)" class="bg-gray-800 p-3 rounded text-white border border-gray-600 focus:border-mcgreen focus:outline-none text-yellow-400 font-bold">
                <div class="flex gap-2">
                    <input type="number" id="s_x" placeholder="X" class="w-1/3 bg-gray-800 p-3 rounded text-white border border-gray-600">
                    <input type="number" id="s_y" placeholder="Y" class="w-1/3 bg-gray-800 p-3 rounded text-white border border-gray-600">
                    <input type="number" id="s_z" placeholder="Z" class="w-1/3 bg-gray-800 p-3 rounded text-white border border-gray-600">
                </div>
                <button onclick="submitShop()" class="w-full bg-mcgreen text-black font-bold py-3 rounded-lg hover:bg-green-400 transition mt-2">Speichern</button>
            </div>
        </div>
    </div>

    <script>
        let currentServer = "";

        async function createServer() {
            const res = await fetch('/api/server/new');
            const data = await res.json();
            document.getElementById('server-code-input').value = data.server_code;
        }

        async function joinServer() {
            const code = document.getElementById('server-code-input').value.toUpperCase();
            if (code.length < 3) return;
            currentServer = code;
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('flex');
            document.getElementById('display-code').innerText = code;
            
            loadShops();
        }

        async function submitShop() {
            const shopData = {
                server_code: currentServer,
                name: document.getElementById('s_name').value,
                owner: document.getElementById('s_owner').value,
                item: document.getElementById('s_item').value,
                price: document.getElementById('s_price').value,
                x: parseInt(document.getElementById('s_x').value) || 0,
                y: parseInt(document.getElementById('s_y').value) || 0,
                z: parseInt(document.getElementById('s_z').value) || 0
            };

            await fetch('/api/shops/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(shopData)
            });
            
            document.getElementById('shop-modal').classList.add('hidden');
            loadShops();
        }

        async function loadShops() {
            let url = `/api/shops/${currentServer}`;
            
            // Smart Navi: Spieler-Koordinaten anhängen
            const px = document.getElementById('my_x').value;
            const py = document.getElementById('my_y').value;
            const pz = document.getElementById('my_z').value;
            
            if (px && py && pz) {
                url += `?player_x=${px}&player_y=${py}&player_z=${pz}`;
            }

            const res = await fetch(url);
            const shops = await res.json();
            const grid = document.getElementById('shops-grid');
            grid.innerHTML = "";

            if (shops.length === 0) {
                grid.innerHTML = "<p class='text-gray-400 col-span-2'>Noch keine Shops vorhanden. Sei der Erste!</p>";
                return;
            }

            shops.forEach(shop => {
                let distanceBadge = "";
                if (shop.distance !== undefined) {
                    distanceBadge = `<span class="bg-blue-600 text-white text-xs font-bold px-2 py-1 rounded absolute top-4 right-4 shadow"><i class="fa-solid fa-route"></i> ${shop.distance} Blöcke entfernt</span>`;
                }

                grid.innerHTML += `
                    <div class="glass-panel p-5 rounded-xl border-t-4 border-mcgreen relative hover:shadow-[0_0_15px_rgba(57,255,20,0.2)] transition duration-300">
                        ${distanceBadge}
                        <h3 class="text-xl font-bold text-white mb-1">${shop.name}</h3>
                        <p class="text-sm text-gray-400 mb-3"><i class="fa-solid fa-user"></i> ${shop.owner}</p>
                        
                        <div class="bg-gray-800 p-3 rounded-lg mb-3 flex justify-between items-center border border-gray-700">
                            <span class="font-bold text-white"><i class="fa-solid fa-box-open text-gray-400 mr-2"></i>${shop.item}</span>
                            <span class="font-bold text-yellow-400">${shop.price}</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2 text-xs">
                            <div class="bg-gray-900 p-2 rounded border border-gray-700 text-center">
                                <span class="text-gray-500 block mb-1">Overworld</span>
                                <span class="text-white font-mono">X:${shop.x} Y:${shop.y} Z:${shop.z}</span>
                            </div>
                            <div class="bg-red-950 p-2 rounded border border-red-900 text-center">
                                <span class="text-red-400 block mb-1">Nether Portal</span>
                                <span class="text-white font-mono">X,Z: ${shop.nether_coords}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>

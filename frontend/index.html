<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineZon Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { mcgreen: '#39ff14', darkbg: '#0f172a', cardbg: '#1e293b' } } }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-text { text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
        .nav-btn.active { border-left: 4px solid #39ff14; background: rgba(255, 255, 255, 0.05); }
        /* Scrollbar für Item-Listen */
        .item-list::-webkit-scrollbar { width: 4px; }
        .item-list::-webkit-scrollbar-thumb { background: #39ff14; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md text-center transition-all">
        <h1 class="text-4xl font-extrabold text-mcgreen mb-2 glow-text"><i class="fa-solid fa-cubes"></i> MineZon</h1>
        <p class="text-gray-400 mb-8">Bedrock Economy System</p>
        <button onclick="createServer()" class="w-full bg-mcgreen text-black font-bold py-3 rounded-lg hover:bg-green-400 mb-4">Serverraum starten</button>
        <div class="flex items-center my-4"><hr class="flex-grow border-gray-600"><span class="px-3 text-gray-500 text-sm">ODER</span><hr class="flex-grow border-gray-600"></div>
        <input type="text" id="server-code-input" placeholder="Server Code..." class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 mb-4 text-center text-xl uppercase">
        <button onclick="joinServer()" class="w-full bg-blue-600 font-bold py-3 rounded-lg hover:bg-blue-500">Beitreten</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" class="hidden w-full max-w-7xl flex flex-col md:flex-row gap-6">
        
        <!-- SIDEBAR -->
        <div class="glass-panel w-full md:w-64 rounded-2xl p-6 flex flex-col gap-2 h-fit shrink-0">
            <h2 class="text-2xl font-bold text-mcgreen glow-text mb-4"><i class="fa-solid fa-cubes"></i> MineZon</h2>
            <div class="bg-gray-800 p-2 rounded-lg text-center border border-gray-700 mb-4">
                <span id="display-code" class="text-xl font-bold text-white tracking-widest">---</span>
            </div>
            
            <button onclick="switchTab('marketplace')" id="nav-marketplace" class="nav-btn active text-left px-4 py-3 rounded text-gray-300 hover:bg-gray-800"><i class="fa-solid fa-store w-6"></i> Marktplatz</button>
            <button onclick="switchTab('bounties')" id="nav-bounties" class="nav-btn text-left px-4 py-3 rounded text-gray-300 hover:bg-gray-800"><i class="fa-solid fa-clipboard-list w-6"></i> Schwarzes Brett</button>
            <button onclick="switchTab('economy')" id="nav-economy" class="nav-btn text-left px-4 py-3 rounded text-gray-300 hover:bg-gray-800"><i class="fa-solid fa-chart-line w-6"></i> Wirtschaft</button>
            
            <!-- Smart Navi im Menü -->
            <div class="mt-4 pt-4 border-t border-gray-700">
                <h3 class="text-xs text-gray-400 mb-2"><i class="fa-solid fa-location-crosshairs"></i> Meine Position</h3>
                <div class="flex gap-1">
                    <input type="number" id="my_x" placeholder="X" class="w-1/3 bg-gray-800 rounded p-1 text-center text-sm" onchange="loadShops()">
                    <input type="number" id="my_y" placeholder="Y" class="w-1/3 bg-gray-800 rounded p-1 text-center text-sm" onchange="loadShops()">
                    <input type="number" id="my_z" placeholder="Z" class="w-1/3 bg-gray-800 rounded p-1 text-center text-sm" onchange="loadShops()">
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT AREA -->
        <div class="flex-grow w-full">
            
            <!-- VIEW: MARKETPLACE -->
            <div id="view-marketplace" class="flex flex-col gap-4">
                <div class="flex justify-between items-center bg-cardbg p-4 rounded-xl border border-gray-700">
                    <h2 class="text-xl font-bold">Shops</h2>
                    <button onclick="openModal('shop-modal')" class="bg-mcgreen text-black px-4 py-2 rounded font-bold text-sm">+ Neuer Shop</button>
                </div>
                <div id="shops-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
            </div>

            <!-- VIEW: SCHWARZES BRETT -->
            <div id="view-bounties" class="hidden flex flex-col gap-4">
                <div class="flex justify-between items-center bg-cardbg p-4 rounded-xl border border-gray-700 border-l-4 border-l-red-500">
                    <h2 class="text-xl font-bold text-red-500">Schwarzes Brett (Aufträge)</h2>
                    <button onclick="openModal('bounty-modal')" class="bg-red-600 text-white px-4 py-2 rounded font-bold text-sm">+ Auftrag erstellen</button>
                </div>
                <div id="bounties-list" class="flex flex-col gap-3"></div>
            </div>

            <!-- VIEW: WIRTSCHAFT (GRAPH) -->
            <div id="view-economy" class="hidden flex flex-col gap-4">
                <div class="bg-cardbg p-4 rounded-xl border border-gray-700 border-l-4 border-l-blue-500">
                    <h2 class="text-xl font-bold text-blue-400">Preis-Entwicklung</h2>
                    <p class="text-sm text-gray-400">Verfolge, wie sich die Preise (z.B. für Diamanten oder Mending) über die Zeit verändern.</p>
                </div>
                <div class="glass-panel p-4 rounded-xl w-full h-[400px]">
                    <canvas id="economyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: NEUER SHOP -->
    <div id="shop-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="glass-panel p-6 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto relative">
            <!-- Zurück Button (X) -->
            <button onclick="closeModal('shop-modal')" class="absolute top-4 right-4 text-gray-400 hover:text-white"><i class="fa-solid fa-xmark fa-xl"></i></button>
            
            <h3 class="font-bold text-xl text-mcgreen mb-4 border-b border-gray-700 pb-2">Neuen Shop erstellen</h3>
            
            <div class="flex flex-col gap-4">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="s_name" placeholder="Shop Name" class="bg-gray-800 p-2 rounded">
                    <input type="text" id="s_owner" placeholder="Besitzer" class="bg-gray-800 p-2 rounded">
                </div>
                <input type="text" id="s_image" placeholder="Bild-URL (z.B. Imgur Link) - Optional" class="bg-gray-800 p-2 rounded w-full">
                
                <div class="bg-gray-900 p-3 rounded-lg border border-gray-700">
                    <div class="flex justify-between items-center mb-2">
                        <h4 class="font-bold text-sm text-gray-300">Angebote</h4>
                        <button onclick="addShopItemField()" class="text-xs bg-gray-700 px-2 py-1 rounded">+ Item</button>
                    </div>
                    <div id="shop-items-container" class="flex flex-col gap-2">
                        <!-- Dynamische Items -->
                        <div class="flex gap-2 shop-item-row">
                            <input type="text" placeholder="Item (z.B. Eisen)" class="w-1/2 bg-gray-800 p-2 rounded item-name">
                            <input type="text" placeholder="Preis (z.B. 2 Dias)" class="w-1/3 bg-gray-800 p-2 rounded item-price text-yellow-400">
                            <input type="number" placeholder="Zahl (für Graph)" class="w-1/4 bg-gray-800 p-2 rounded item-num" title="Nur die Zahl für den Graphen">
                        </div>
                    </div>
                </div>

                <div class="flex gap-2">
                    <input type="number" id="s_x" placeholder="X Coord" class="w-1/3 bg-gray-800 p-2 rounded">
                    <input type="number" id="s_y" placeholder="Y Coord" class="w-1/3 bg-gray-800 p-2 rounded">
                    <input type="number" id="s_z" placeholder="Z Coord" class="w-1/3 bg-gray-800 p-2 rounded">
                </div>
                
                <div class="flex gap-2 mt-2">
                    <button onclick="closeModal('shop-modal')" class="w-1/3 bg-gray-700 text-white py-2 rounded">Zurück</button>
                    <button onclick="submitShop()" class="w-2/3 bg-mcgreen text-black font-bold py-2 rounded">Shop veröffentlichen</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: NEUES KOPFGELD -->
    <div id="bounty-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="glass-panel p-6 rounded-2xl w-full max-w-md relative">
            <button onclick="closeModal('bounty-modal')" class="absolute top-4 right-4 text-gray-400 hover:text-white"><i class="fa-solid fa-xmark fa-xl"></i></button>
            <h3 class="font-bold text-xl text-red-500 mb-4">Auftrag ausschreiben</h3>
            <div class="flex flex-col gap-3">
                <input type="text" id="b_buyer" placeholder="Dein Name" class="bg-gray-800 p-2 rounded">
                <input type="text" id="b_wanted" placeholder="Was suchst du? (z.B. 10 Stacks Glas)" class="bg-gray-800 p-2 rounded">
                <input type="text" id="b_reward" placeholder="Belohnung (z.B. 5 Diamanten)" class="bg-gray-800 p-2 rounded text-yellow-400">
                <button onclick="submitBounty()" class="w-full bg-red-600 text-white font-bold py-2 rounded mt-2">Auftrag posten</button>
            </div>
        </div>
    </div>

    <script>
        let currentServer = "";
        let economyChartInstance = null;

        // --- UI & TAB LOGIC ---
        function switchTab(tabName) {
            ['marketplace', 'bounties', 'economy'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).classList.remove('active');
            });
            document.getElementById(`view-${tabName}`).classList.remove('hidden');
            document.getElementById(`nav-${tabName}`).classList.add('active');
            
            if(tabName === 'marketplace') loadShops();
            if(tabName === 'bounties') loadBounties();
            if(tabName === 'economy') loadChart();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // --- SHOP DYNAMIC ITEMS ---
        function addShopItemField() {
            const container = document.getElementById('shop-items-container');
            const row = document.createElement('div');
            row.className = "flex gap-2 shop-item-row mt-2";
            row.innerHTML = `
                <input type="text" placeholder="Item" class="w-1/2 bg-gray-800 p-2 rounded item-name">
                <input type="text" placeholder="Preis" class="w-1/3 bg-gray-800 p-2 rounded item-price text-yellow-400">
                <input type="number" placeholder="Zahl" class="w-1/4 bg-gray-800 p-2 rounded item-num">
                <button onclick="this.parentElement.remove()" class="text-red-500 px-2"><i class="fa-solid fa-trash"></i></button>
            `;
            container.appendChild(row);
        }

        // --- SERVER LOGIN ---
        async function createServer() {
            const res = await fetch('/api/server/new');
            const data = await res.json();
            document.getElementById('server-code-input').value = data.server_code;
        }

        async function joinServer() {
            const code = document.getElementById('server-code-input').value.toUpperCase();
            if (code.length < 3) return;
            currentServer = code;
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('flex');
            document.getElementById('display-code').innerText = code;
            
            loadShops();
        }

        // --- API CALLS: SHOPS ---
        async function submitShop() {
            // Sammle alle Items ein
            let itemsList = [];
            document.querySelectorAll('.shop-item-row').forEach(row => {
                const name = row.querySelector('.item-name').value;
                const price = row.querySelector('.item-price').value;
                const num = parseFloat(row.querySelector('.item-num').value) || 0;
                if(name && price) itemsList.push({ name, price, price_number: num });
            });

            if(itemsList.length === 0) return alert("Füge mindestens ein Item hinzu!");

            const shopData = {
                server_code: currentServer,
                name: document.getElementById('s_name').value,
                owner: document.getElementById('s_owner').value,
                image_url: document.getElementById('s_image').value,
                items: itemsList,
                x: parseInt(document.getElementById('s_x').value) || 0,
                y: parseInt(document.getElementById('s_y').value) || 0,
                z: parseInt(document.getElementById('s_z').value) || 0
            };

            await fetch('/api/shops/add', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(shopData) });
            closeModal('shop-modal');
            
            // Felder leeren
            document.getElementById('s_name').value = ""; document.getElementById('s_image').value = "";
            loadShops();
        }

        async function loadShops() {
            let url = `/api/shops/${currentServer}`;
            const px = document.getElementById('my_x').value, py = document.getElementById('my_y').value, pz = document.getElementById('my_z').value;
            if (px && py && pz) url += `?player_x=${px}&player_y=${py}&player_z=${pz}`;

            const res = await fetch(url);
            const shops = await res.json();
            const grid = document.getElementById('shops-grid');
            grid.innerHTML = "";

            shops.forEach(shop => {
                // Bild generieren (Wenn keins da, nimm ein Platzhalter-Bild)
                const imgUrl = shop.image_url || 'https://images.unsplash.com/photo-1606167668584-d5eb9236dcd2?q=80&w=300&auto=format&fit=crop';
                let distanceBadge = shop.distance !== undefined ? `<span class="absolute top-2 right-2 bg-blue-600 text-xs px-2 py-1 rounded shadow"><i class="fa-solid fa-route"></i> ${shop.distance}m</span>` : '';
                
                // Item Liste bauen
                let itemsHTML = shop.items.map(i => `
                    <div class="flex justify-between items-center bg-gray-800 p-2 mb-1 rounded">
                        <span class="text-sm font-bold text-gray-200">${i.name}</span>
                        <span class="text-sm font-bold text-yellow-400">${i.price}</span>
                    </div>
                `).join('');

                grid.innerHTML += `
                    <div class="glass-panel rounded-xl overflow-hidden border border-gray-700 hover:border-mcgreen transition flex flex-col h-full relative">
                        ${distanceBadge}
                        <div class="h-32 w-full overflow-hidden">
                            <img src="${imgUrl}" class="w-full h-full object-cover">
                        </div>
                        <div class="p-4 flex-grow flex flex-col">
                            <h3 class="text-lg font-bold text-white">${shop.name}</h3>
                            <p class="text-xs text-gray-400 mb-3"><i class="fa-solid fa-user"></i> by ${shop.owner}</p>
                            
                            <div class="item-list flex-grow overflow-y-auto max-h-32 mb-3 pr-1">
                                ${itemsHTML}
                            </div>
                            
                            <div class="mt-auto grid grid-cols-2 gap-2 text-[10px]">
                                <div class="bg-gray-900 p-1.5 rounded text-center text-gray-400 border border-gray-700">Over: ${shop.x}, ${shop.z}</div>
                                <div class="bg-red-950 p-1.5 rounded text-center text-red-400 border border-red-900">Nether: ${shop.nether_coords}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // --- API CALLS: BOUNTIES ---
        async function submitBounty() {
            const b = {
                server_code: currentServer, buyer: document.getElementById('b_buyer').value,
                item_wanted: document.getElementById('b_wanted').value, reward: document.getElementById('b_reward').value
            };
            await fetch('/api/bounties/add', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(b) });
            closeModal('bounty-modal');
            loadBounties();
        }

        async function loadBounties() {
            const res = await fetch(`/api/bounties/${currentServer}`);
            const data = await res.json();
            const list = document.getElementById('bounties-list');
            list.innerHTML = "";
            data.forEach(b => {
                list.innerHTML += `
                    <div class="glass-panel p-4 rounded-lg flex justify-between items-center border-l-4 border-l-red-500">
                        <div>
                            <p class="text-xs text-gray-400">Gesucht von: ${b.buyer}</p>
                            <h4 class="font-bold text-lg text-white">${b.item_wanted}</h4>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-gray-400">Belohnung</p>
                            <p class="font-bold text-yellow-400 text-lg">${b.reward}</p>
                        </div>
                    </div>
                `;
            });
        }

        // --- API CALLS: ECONOMY GRAPH ---
        async function loadChart() {
            const res = await fetch(`/api/economy/chart/${currentServer}`);
            const data = await res.json();
            
            const ctx = document.getElementById('economyChart').getContext('2d');
            
            // Wenn der Graph schon existiert, löschen, bevor wir ihn neu zeichnen
            if(economyChartInstance) economyChartInstance.destroy();

            // Bunte Farben für verschiedene Items generieren
            const colors = ['#39ff14', '#3b82f6', '#ef4444', '#f59e0b', '#a855f7'];
            let colorIndex = 0;

            const chartDatasets = Object.keys(data).map(itemName => {
                let col = colors[colorIndex % colors.length]; colorIndex++;
                return {
                    label: itemName.toUpperCase(),
                    data: data[itemName].prices,
                    borderColor: col,
                    backgroundColor: col + '33', // Leicht transparent
                    tension: 0.4,
                    fill: true
                };
            });

            // Wir nehmen die Zeitstempel des ersten Items als X-Achse
            const labels = Object.keys(data).length > 0 ? data[Object.keys(data)[0]].times.map(t => t.split(' ')[0]) : [];

            economyChartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: chartDatasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: 'white' } } },
                    scales: {
                        x: { ticks: { color: '#aaa' }, grid: { color: '#333' } },
                        y: { ticks: { color: '#aaa' }, grid: { color: '#333' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
